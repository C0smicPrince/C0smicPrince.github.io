<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 - Under Construction</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6; /* Sleek tech blue */
            --muted-color: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Subtle background grid pattern */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 2rem;
            max-width: 500px;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
            background: linear-gradient(180deg, #ffffff 30%, var(--muted-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            position: relative;
        }

        .status-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-color);
            font-size: 0.75rem;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-radius: 4px;
            margin-bottom: 2rem;
            animation: pulse 2s infinite alternate;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            color: #ffffff;
        }

        p {
            color: var(--muted-color);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* Pure CSS Loading/Construction Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-bar {
            width: 40%;
            height: 100%;
            background: var(--accent-color);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--accent-color);
            animation: loading 2.5s infinite ease-in-out;
        }

        .footer {
            font-family: monospace;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.05em;
        }

        /* Animations */
        @keyframes pulse {
            0% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.3); }
            100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); border-color: rgba(59, 130, 246, 0.6); }
        }

        @keyframes loading {
            0% { transform: translateX(-150%); }
            50% { transform: translateX(250%); }
            100% { transform: translateX(-150%); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="error-code">401</div>
        <div class="status-badge">Authorization Required // Deployment In Progress</div>
        
        <h1>We are building something raw.</h1>
        <p>Access to this environment is currently restricted to active development. The public layer will go live as soon as compiling is finished.</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="footer">STAY TUNED // CODENAME: C0smicPrince</div>
    </div>

</body>
</html>
