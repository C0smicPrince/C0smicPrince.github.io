<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashbo3n</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --text-main: #ffffff;
            --text-dim: #404040;
            --accent: #ffffff;
            --border: #101010;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Outfit', sans-serif; 
            min-height: 100vh;
        }

        nav { 
            display: flex; 
            justify-content: center; 
            gap: 6rem; 
            padding: 4rem; 
            border-bottom: 1px solid var(--border); 
        }
        nav a { 
            color: var(--text-dim); 
            text-decoration: none; 
            font-size: 1rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            cursor: pointer; 
            transition: color 0.4s;
        }
        nav a:hover, nav a.active { color: var(--text-main); }

        .container { 
            max-width: 1600px; 
            margin: 0 auto; 
            padding: 8rem 4rem; 
        }

        .view { display: none; }
        .view.active-view { display: block; }

        .hero { margin-bottom: 10rem; }
        .hero h1 { font-size: 8rem; font-weight: 700; letter-spacing: -4px; margin-bottom: 2rem; }
        .hero p { font-size: 2rem; color: var(--text-dim); font-weight: 300; }

        /* The Grid: Perfectly empty, waiting for you to populate */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); 
            gap: 4rem; 
        }
        .card { 
            border: 1px solid var(--border); 
            padding: 5rem; 
            min-height: 400px;
        }
        .card h2 { font-size: 3rem; margin-bottom: 3rem; color: var(--text-dim); }
    </style>
</head>
<body>

    <nav>
        <a onclick="navigate('home')" id="link-home" class="active">Home</a>
        <a onclick="navigate('writeups')" id="link-writeups">Writeups</a>
        <a onclick="navigate('malware')" id="link-malware">Malware Dev</a>
    </nav>

    <div class="container">
        <div id="home" class="view active-view">
            <div class="hero">
                <h1>Ashbo3n</h1>
                <p>Sole Exploit Developer & Researcher</p>
            </div>
            <div class="grid">
                <div class="card"><h2>Writeups</h2></div>
                <div class="card"><h2>Malware Dev</h2></div>
            </div>
        </div>

        <div id="writeups" class="view">
            <div class="grid">
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
            </div>
        </div>

        <div id="malware" class="view">
            <div class="grid">
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
            </div>
        </div>
    </div>

    <script>
        function navigate(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('nav a').forEach(l => l.classList.remove('active'));
            document.getElementById(viewId).classList.add('active-view');
            const link = document.getElementById('link-' + viewId);
            if(link) link.classList.add('active');
        }
    </script>
</body>
</html>
